name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dbt Snowflake adapter
        run: |
          python -m pip install --upgrade pip
          pip install dbt-snowflake

      - name: Check Snowflake secrets
        id: snowflake_check
        run: |
          if [ -z "${{ secrets.SNOWFLAKE_ACCOUNT }}" ] || \
             [ -z "${{ secrets.SNOWFLAKE_USER }}" ] || \
             [ -z "${{ secrets.SNOWFLAKE_PASSWORD }}" ] || \
             [ -z "${{ secrets.SNOWFLAKE_WAREHOUSE }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Snowflake secrets not configured. Skipping deploy."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup dbt profile
        if: steps.snowflake_check.outputs.available == 'true'
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          banking_dbt:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: ACCOUNTADMIN
                database: BANKING
                warehouse: "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
                schema: ANALYTICS
                threads: 4
          EOF

      - name: dbt run + test (prod)
        if: steps.snowflake_check.outputs.available == 'true'
        working-directory: banking_dbt
        run: |
          dbt deps
          dbt run
          dbt test
